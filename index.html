<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ─────────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml"  href="/icons/favicon.svg" />
    <link rel="icon" type="image/png"      href="/icons/logo-96.png"  sizes="96x96" />
    <link rel="icon" type="image/png"      href="/icons/logo-192.png" sizes="192x192" />
    <link rel="apple-touch-icon"           href="/icons/logo-192.png" />

    <!-- ── Theme color (dark default, light override via media) ─────────── -->
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <meta name="description" content="Moniv — controle total das suas finanças pessoais. Acompanhe receitas, despesas, metas e orçamentos num único app seguro e intuitivo." />
    <meta name="keywords"    content="finanças pessoais, controle financeiro, orçamento, metas financeiras, app finanças, moniv" />
    <meta name="author"      content="Moniv" />
    <meta name="robots"      content="index, follow" />

    <!-- ── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Moniv" />
    <meta property="og:title"       content="Moniv — Finanças Pessoais Inteligentes" />
    <meta property="og:description" content="Controle total das suas finanças. Receitas, despesas, metas e orçamentos num único lugar." />
    <meta property="og:url"         content="https://www.moniv.app" />
    <meta property="og:image"       content="https://www.moniv.app/logo.png" />
    <meta property="og:locale"      content="pt_BR" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Moniv — Finanças Pessoais Inteligentes" />
    <meta name="twitter:description" content="Controle total das suas finanças pessoais." />
    <meta name="twitter:image"       content="https://www.moniv.app/logo.png" />

    <!-- ── iOS PWA ──────────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="Moniv" />

    <!-- ── Microsoft Tiles ──────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-TileImage" content="/icons/logo-192.png" />

    <!-- ── Preconnect para serviços externos ────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Moniv — Finanças Pessoais</title>
  </head>

  <body>
    <div id="root"></div>

    <!--
      Captura beforeinstallprompt ANTES do React montar.
      O evento pode disparar muito cedo — antes do bundle JS carregar.
      Guardamos numa variável global para o hook usePWAInstall ler na inicialização.
    -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        window.dispatchEvent(new Event('pwa-prompt-ready'));
      });
      window.addEventListener('appinstalled', function () {
        window.__pwaInstallPrompt = null;
        window.dispatchEvent(new Event('pwa-app-installed'));
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
