<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>Moniv — Sem conexão</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0a0a0f;
        --surface:  #16161f;
        --border:   #25253a;
        --primary:  #6366f1;
        --fg:       #f9fafb;
        --fg-muted: #9ca3af;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem;
        text-align: center;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        max-width: 360px;
        width: 100%;
        box-shadow: 0 25px 50px rgba(0,0,0,.5);
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 1.25rem;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        box-shadow: 0 0 32px rgba(99,102,241,.4);
      }

      .icon-wrap img {
        width: 44px;
        height: 44px;
        object-fit: contain;
        border-radius: .5rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: .5rem;
        letter-spacing: -.02em;
      }

      p {
        color: var(--fg-muted);
        font-size: .875rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: .375rem;
        background: rgba(99,102,241,.15);
        border: 1px solid rgba(99,102,241,.3);
        color: var(--primary);
        font-size: .75rem;
        font-weight: 600;
        padding: .375rem .875rem;
        border-radius: 9999px;
        margin-bottom: 1.75rem;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
        opacity: .6;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: .6; transform: scale(1); }
        50%       { opacity: 1;  transform: scale(1.3); }
      }

      button {
        display: block;
        width: 100%;
        padding: .875rem;
        border-radius: 1rem;
        border: none;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #fff;
        font-size: .9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity .15s, transform .1s;
        box-shadow: 0 4px 24px rgba(99,102,241,.35);
      }

      button:hover  { opacity: .9; }
      button:active { transform: scale(.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <img src="/logo.png" alt="Moniv" onerror="this.style.display='none'" />
      </div>

      <div class="badge">
        <span class="dot"></span>
        Modo offline
      </div>

      <h1>Sem conexão à internet</h1>
      <p>
        O Moniv precisa de conexão para sincronizar os seus dados.<br />
        Verifique a sua rede e tente novamente.
      </p>

      <button onclick="location.reload()">Tentar novamente</button>
    </div>

    <script>
      // Recarregar automaticamente quando conexão voltar
      window.addEventListener('online', () => location.reload())
    </script>
  </body>
</html>
